<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block titre %}Gestion Emploi du Temps{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
        header { background: #1d4ed8; color: white; padding: 1rem 2rem; }
        main { max-width: 960px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 12px; }
        a { color: #1d4ed8; }
        .actions { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1.5rem; }
        .bouton { background: #1d4ed8; color: white; padding: .7rem 1rem; border-radius: 8px; text-decoration: none; border: 0; cursor: pointer; }
        .secondaire { background: #e5e7eb; color: #111827; }
        .message { background: #dcfce7; color: #166534; padding: .8rem 1rem; border-radius: 8px; margin-bottom: 1rem; }
        label { display: block; font-weight: bold; margin-top: 1rem; }
        input { width: 100%; padding: .7rem; margin-top: .4rem; box-sizing: border-box; }
        .erreur { color: #b91c1c; margin-top: .8rem; }
    </style>
</head>
<body>
    <header>
        <strong>Gestion Emploi du Temps</strong>
        {% if user.is_authenticated %}
            <span> — {{ user.prenom }} {{ user.nom }} ({{ user.get_role_display }})</span>
        {% endif %}
    </header>
    <main>
        {% for message in messages %}
            <div class="message">{{ message }}</div>
        {% endfor %}
        {% block contenu %}{% endblock %}
    </main>
</body>
</html>
